<!DOCTYPE html>
<html>
<head>
  <title>Atividade 02 - Unidade 2</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>
<body>

    <div id="menu">
        <button id="menu-toggle">Models</button>
        <ul id="model-list">
            <li class="model-item active" data-model="url(Chest.glb)">Chest</li>
        </ul>
    </div>
    <a-scene embedded arjs="sourceType: webcam;" gesture-detector renderer="colorManagement: true;">

    <a-entity
        camera
        cursor="rayOrigin: mouse; fuse: false"
        raycaster="objects: .tocavel">
    </a-entity>

    <a-marker preset="hiro">
    <a-entity
        id="ar-model"
        class="tocavel"
        gesture-handler
        gltf-model="url(Chest.glb)"
        scale="0.7 0.7 0.7"
        position="0 0.5 0"
        animation__grow="property: scale; to: 2 2 2; dur: 60; startEvents: mousedown"
        animation__shrink="property: scale; to: 0.3 0.3 0.3; dur: 60; startEvents: mouseup">
        <a-circle 
            rotation="-90 0 0" 
            radius="0.8" 
            color="#000" 
            opacity="0.3" 
            position="0 0.01 0">
        </a-circle>
    </a-entity>

    <a-light type="ambient" color="#FFF" intensity="2.0"></a-light>

    <a-light type="directional" color="#FFF" intensity="1.5" position="5 10 5"></a-light>
    </a-marker>

    </a-scene>

    <script src="main.js"></script>
</body>
</html>
