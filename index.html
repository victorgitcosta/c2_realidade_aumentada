<!DOCTYPE html>
<html>
<head>
  <title>Meu Projeto AR</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>
<body>

    <!-- Overlay Menu -->>
    <div id="menu">
        <button id="menu-toggle">Models</button>
        <ul id="model-list">
            <li class="model-item active" data-model="url(Chest.glb)">Chest</li>
            <!--<li class="model-item" data-model="url(Cubo.glb)">Cubo</li>-->
        </ul>
    </div>
    <!--AR Scene-->
    <a-scene embedded arjs="sourceType: webcam;" gesture-detector>

    <a-entity
        camera
        cursor="rayOrigin: mouse; fuse: false"
        raycaster="objects: .tocavel">
    </a-entity>

    <a-marker preset="hiro">
        <a-entity
            id="ar-model"
            class="tocavel"
            gesture-handler
            gltf-model="url(Chest.glb)"
            scale="1.0 1.0 1.0"
            position="0 0 0"
            animation__grow="property: scale; to: 3 3 3; dur: 120; startEvents: mousedown"
            animation__shrink="property: scale; to: 0.5 0.5 0.5; dur: 120; startEvents: mouseup">
        </a-entity>

        <a-light type="ambient" color="#BBB"></a-light>
        <a-light type="directional" intensity="0.8" position="-1 4 5"></a-light>
    </a-marker>

    </a-scene>

    <script src="main.js"></script>
</body>
</html>
